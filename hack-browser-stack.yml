# Step 1: Create and label the namespace (run this first)
# Create namespace if it doesn't exist, then label it with required Kyverno labels
kubectl create namespace onelens-agent 2>/dev/null || true && \
kubectl label namespace onelens-agent \
  browserstack.com/BillingTeam=core \
  browserstack.com/Team=infra \
  browserstack.com/Env=stag \
  browserstack.com/release=ga \
  browserstack.com/monitoring=true \
  --overwrite


# Step 2: Run your helm install command (this should now work)
helm upgrade --install onelensdeployer onelens/onelensdeployer -n onelens-agent \
  --set job.env.CLUSTER_NAME=browserstack-euc1-stag-001 \
  --set job.env.REGION=eu-central-1 \
  --set-string job.env.ACCOUNT=737963123736 \
  --set job.env.REGISTRATION_TOKEN=f06d12c1-2952-4017-bffb-149170ac6d35 \
  --set job.env.NODE_SELECTOR_KEY=purpose \
  --set job.env.NODE_SELECTOR_VALUE=eks-pvtci-generic-amd64 \
  --set job.env.TOLERATION_KEY=eks-pvtci-generic-amd64 \
  --set-string job.env.TOLERATION_VALUE="" \
  --set job.env.TOLERATION_OPERATOR=Exists \
  --set job.env.TOLERATION_EFFECT=NoSchedule \
  --set job.nodeSelector.purpose=eks-pvtci-generic-amd64 \
  --set 'job.tolerations[0].key=eks-pvtci-generic-amd64' \
  --set 'job.tolerations[0].operator=Exists' \
  --set 'job.tolerations[0].effect=NoSchedule' \
  --set cronjob.nodeSelector.purpose=eks-pvtci-generic-amd64 \
  --set 'cronjob.tolerations[0].key=eks-pvtci-generic-amd64' \
  --set 'cronjob.tolerations[0].operator=Exists' \
  --set 'cronjob.tolerations[0].effect=NoSchedule' \
  --set job.labels."browserstack\.com/BillingTeam"=core \
  --set job.labels."browserstack\.com/Env"=stag \
  --set job.labels."browserstack\.com/Team"=infra \
  --set job.labels."browserstack\.com/application"=onelens \
  --set job.labels."browserstack\.com/component"=onelens \
  --set job.labels."browserstack\.com/release"=ga \
  --set cronjob.labels."browserstack\.com/BillingTeam"=core \
  --set cronjob.labels."browserstack\.com/Env"=stag \
  --set cronjob.labels."browserstack\.com/Team"=infra \
  --set cronjob.labels."browserstack\.com/application"=onelens \
  --set cronjob.labels."browserstack\.com/component"=onelens \
  --set cronjob.labels."browserstack\.com/release"=ga




