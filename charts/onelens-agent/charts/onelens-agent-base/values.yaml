# Default values for onelens-agent-base

image:
  repository: public.ecr.aws/w7k6q5m9/onelens-agent
  tag: v2.1.102
  pullPolicy: IfNotPresent
nameOverride: "onelens-agent"
fullnameOverride: "onelens-agent"
imagePullSecrets: null
serviceAccount:
  enabled: true
  name: "onelens-agent-sa"
  annotations: {}
storageClass:
  enabled: true
  name: onelens-sc
  # Cloud Provider: Set based on your Kubernetes environment
  # AWS EKS: ebs.csi.aws.com
  # Azure AKS: disk.csi.azure.com
  # GKE: pd.csi.storage.gke.io
  provisioner: ebs.csi.aws.com
  reclaimPolicy: Delete
  volumeBindingMode: WaitForFirstConsumer
  # AWS EBS volume type (also used as fallback for generic provisioners)
  volumeType: gp3
  allowVolumeExpansion: true
  encryption:
    enabled: false
    kmsKeyId: "" # AWS KMS Key ARN for encryption
  # Volume tagging configuration (AWS-specific)
  volumeTags:
    enabled: true
    tags:
      Application_Name: "OnelensAgent"
      Application_Owner: "Astuto"
  # Azure-specific parameters (used when provisioner is disk.csi.azure.com)
  azure:
    skuName: StandardSSD_LRS # Options: Standard_LRS, Premium_LRS, StandardSSD_LRS, UltraSSD_LRS
    cachingMode: ReadOnly # Options: None, ReadOnly, ReadWrite
    # Azure Disk tags (comma-separated key=value pairs)
    tags:
      enabled: false
      value: "" # Format: "key1=value1,key2=value2"
    # Azure Disk Encryption using Disk Encryption Set
    encryption:
      enabled: false
      diskEncryptionSetID: "" # Azure Disk Encryption Set resource ID
  # GKE-specific parameters (used when provisioner is pd.csi.storage.gke.io)
  gke:
    type: pd-balanced # Options: pd-standard, pd-balanced, pd-ssd
  # AWS EFS parameters (used when provisioner is efs.csi.aws.com)
  efs:
    fileSystemId: ""
  # Metadata labels
  labels:
    Application_Name: "OnelensAgent"
    Application_Owner: "Astuto"
resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"
# CronJob configuration
cronJob:
  cronSchedule: "0 * * * *" # Run once an hour at the top of the hour
  concurrencyPolicy: "Forbid" # Prevent concurrent job executions
  successfulJobsHistoryLimit: 3 # Number of successful jobs to keep
  failedJobsHistoryLimit: 2 # Number of failed jobs to keep
  backoffLimit: 0 # Number of retries before giving up
  suspend: false # Suspend the job
  restartPolicy: "Never" # Restart the job on failure
  healthCheck: false # Set to true to enable health check for cronjob pod
  activeDeadlineSeconds: 3300 # Maximum time in seconds the job can run
  # Tolerations allow the agent to be scheduled on nodes with matching taints
  tolerations: []
  # - key: "key"
  #   operator: "Equal"
  #   value: "value"
  #   effect: "NoSchedule"
  nodeSelector: {}
  # kubernetes.io/os: linux
# Environment variables
env:
  # Health Checker URLs
  OPENCOST_HEALTH_CHECKER_URL: "http://onelens-agent-prometheus-opencost-exporter:9003/healthz"
  PROMETHEUS_HEALTH_CHECKER_URL: "http://onelens-agent-prometheus-server:80/-/healthy"
  # Sizing evaluation interval (hours). Controls how often usage-based downsizing
  # is allowed. Shorter intervals converge faster but need sufficient usage data.
  # Minimum: 24 (one diurnal cycle). Default: 72.
  FULL_EVAL_INTERVAL_HOURS: "72"
secrets:
  # Secrets for onelens-agent
  API_BASE_URL: "https://dev-api.onelens.cloud" # DON'T ADD TRAILING SLASH
  CLUSTER_TOKEN: "your-raw-token" # Don't encode
  REGISTRATION_ID: "your-raw-id" # Don't encode
# GPU monitoring (DCGM exporter DaemonSet)
gpu:
  enabled: "false" # "true" | "false" — resolved by patching.sh/install.sh from "auto" detection
  dcgmExporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:3.3.9-3.6.1-ubuntu22.04
# Network cost attribution (opt-in)
networkCosts:
  enabled: false
  image:
    registry: public.ecr.aws
    repository: w7k6q5m9/onelens-network-costs
    tag: "0.1.3"
    pullPolicy: IfNotPresent
  initImage:
    repository: busybox
    tag: "1.36"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  cloudProvider:
    aws: false
    gcp: false
    azure: false
  destinations: {}
  logLevel: info
  tolerations:
    - effect: NoSchedule
      operator: Exists
    - effect: NoExecute
      operator: Exists
