{{- if and .Values.networkCosts .Values.networkCosts.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "onelens-agent.fullname" . }}-network-costs-leader-election
  labels:
    {{- include "onelens-agent.labels" . | nindent 4 }}
rules:
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "onelens-agent.fullname" . }}-network-costs-leader-election
  labels:
    {{- include "onelens-agent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "onelens-agent.fullname" . }}-network-costs-leader-election
subjects:
- kind: ServiceAccount
  name: {{ include "onelens-agent.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}
