{{- if .Values.storageClass.enabled }}
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: {{ .Values.storageClass.name }}
  {{- if .Values.storageClass.labels }}
  labels:
    {{- range $key, $value := .Values.storageClass.labels }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  {{- end }}
provisioner: {{ .Values.storageClass.provisioner }}
reclaimPolicy: {{ .Values.storageClass.reclaimPolicy }}
volumeBindingMode: {{ .Values.storageClass.volumeBindingMode }}
allowVolumeExpansion: {{ .Values.storageClass.allowVolumeExpansion | default false }}
parameters:
  {{- if eq .Values.storageClass.provisioner "ebs.csi.aws.com" }}
  # AWS EBS CSI Driver parameters
  type: {{ .Values.storageClass.volumeType }}
  {{- if .Values.storageClass.encryption.enabled }}
  encrypted: "true"
  {{- if .Values.storageClass.encryption.kmsKeyId }}
  kmsKeyId: {{ .Values.storageClass.encryption.kmsKeyId | quote }}
  {{- end }}
  {{- end }}
  {{- if .Values.storageClass.volumeTags.enabled }}
  {{- $tagIndex := 1 }}
  {{- range $key, $value := .Values.storageClass.volumeTags.tags }}
  tagSpecification_{{ $tagIndex }}: {{ printf "%s=%s" $key $value | quote }}
  {{- $tagIndex = add $tagIndex 1 }}
  {{- end }}
  {{- end }}
  {{- else if eq .Values.storageClass.provisioner "disk.csi.azure.com" }}
  # Azure Disk CSI Driver parameters
  skuName: {{ .Values.storageClass.azure.skuName | default "StandardSSD_LRS" }}
  {{- if .Values.storageClass.azure.cachingMode }}
  cachingMode: {{ .Values.storageClass.azure.cachingMode }}
  {{- end }}
  {{- if and .Values.storageClass.azure.encryption.enabled .Values.storageClass.azure.encryption.diskEncryptionSetID }}
  diskEncryptionSetID: {{ .Values.storageClass.azure.encryption.diskEncryptionSetID | quote }}
  {{- end }}
  {{- if .Values.storageClass.azure.tags.enabled }}
  tags: {{ .Values.storageClass.azure.tags.value | quote }}
  {{- end }}
  {{- else if eq .Values.storageClass.provisioner "efs.csi.aws.com" }}
  # AWS EFS CSI Driver parameters
  provisioningMode: efs-ap
  fileSystemId: {{ .Values.storageClass.efs.fileSystemId }}
  directoryPerms: "700"
  {{- else if eq .Values.storageClass.provisioner "pd.csi.storage.gke.io" }}
  # GKE Persistent Disk CSI Driver parameters
  type: {{ .Values.storageClass.gke.type | default "pd-balanced" }}
  {{- else }}
  # Generic parameters for other provisioners
  {{- if .Values.storageClass.volumeType }}
  type: {{ .Values.storageClass.volumeType }}
  {{- end }}
  {{- end }}
{{- end }}
