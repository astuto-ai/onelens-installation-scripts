{{- if eq .Values.metricsBackend "victoriametrics" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: onelens-agent-prometheus-server
  labels:
    {{- include "onelens-agent.labels" . | nindent 4 }}
    component: victoriametrics
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: onelens-agent-prometheus-server
      component: victoriametrics
  template:
    metadata:
      labels:
        app: onelens-agent-prometheus-server
        component: victoriametrics
    spec:
      serviceAccountName: onelens-agent-prometheus-server
      securityContext:
        runAsUser: 65534
        runAsNonRoot: true
        runAsGroup: 65534
        fsGroup: 65534
      {{- with .Values.victoriaMetrics.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.victoriaMetrics.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: victoriametrics
          image: "{{ .Values.victoriaMetrics.image.repository }}:{{ .Values.victoriaMetrics.image.tag }}"
          imagePullPolicy: {{ .Values.victoriaMetrics.image.pullPolicy | default "IfNotPresent" }}
          args:
            - "-promscrape.config=/config/prometheus.yml"
            - "-promscrape.config.strictParse=false"
            - "-retentionPeriod={{ .Values.victoriaMetrics.retentionPeriod }}"
            - "-maxLabelsPerTimeseries={{ .Values.victoriaMetrics.maxLabelsPerTimeseries }}"
            - "-storageDataPath=/victoria-metrics-data"
          ports:
            - name: http
              containerPort: 8428
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: 8428
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8428
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.victoriaMetrics.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: data
              mountPath: /victoria-metrics-data
      volumes:
        - name: config
          configMap:
            name: onelens-agent-prometheus-server
        - name: data
          {{- if .Values.victoriaMetrics.persistentVolume.enabled }}
          persistentVolumeClaim:
            claimName: onelens-agent-prometheus-server
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- end }}
