apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "onelens-agent.fullname" . }}-workload-reader-binding
  labels:
    {{- include "onelens-agent.labels" . | nindent 4 }}
subjects:
- kind: ServiceAccount
  name: {{ include "onelens-agent.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "onelens-agent.fullname" . }}-workload-reader
  apiGroup: rbac.authorization.k8s.io 