{{- if and .Values.bootstrapRbac.clusterRole.enabled .Release.IsInstall }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.bootstrapRbac.clusterRole.name }}
  labels:
    {{- with (default dict .Values.globals).labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
rules:
{{- toYaml .Values.bootstrapRbac.clusterRole.rules | nindent 2 }}
{{- end }}

