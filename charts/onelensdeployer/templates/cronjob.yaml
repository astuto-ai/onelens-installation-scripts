{{- if .Values.cronjob.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Values.cronjob.name }}
  labels:
    {{- with (default dict .Values.globals).labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with .Values.cronjob.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  schedule: "{{ .Values.cronjob.schedule }}"
  concurrencyPolicy: {{ .Values.cronjob.concurrencyPolicy }}
  successfulJobsHistoryLimit: {{ .Values.cronjob.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.cronjob.failedJobsHistoryLimit }}
  suspend: {{ .Values.cronjob.suspend }}
  jobTemplate:
    spec:
      backoffLimit: {{ default 0 .Values.cronjob.backoffLimit }}
      {{- if .Values.cronjob.activeDeadlineSeconds }}
      activeDeadlineSeconds: {{ .Values.cronjob.activeDeadlineSeconds }}
      {{- end }}
      ttlSecondsAfterFinished: {{ default 86400 .Values.cronjob.ttlSecondsAfterFinished }}
      template:
        metadata:
          labels:
            {{- with (default dict .Values.globals).labels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- with .Values.cronjob.labels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
        spec:
          serviceAccountName: {{ .Values.cronjob.serviceAccount.name }}
          {{- with .Values.cronjob.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.cronjob.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          containers:
            - name: {{ .Values.cronjob.name }}
              image: {{ .Values.cronjob.image }}:v{{ .Chart.AppVersion }}
              imagePullPolicy: {{ default "Always" .Values.cronjob.imagePullPolicy }}
              {{- with .Values.cronjob.resources }}
              resources:
                {{- toYaml . | nindent 16 }}
              {{- end }}
              env:
                {{- range $key, $value := .Values.cronjob.env }}
                - name: {{ $key }}
                  value: {{ $value | quote }}
                {{- end }}
                {{- if .Values.podCountOverride }}
                - name: POD_COUNT_OVERRIDE
                  value: {{ .Values.podCountOverride | quote }}
                {{- end }}
                - name: REGISTRATION_ID
                  valueFrom:
                    secretKeyRef:
                      name: onelens-agent-secrets
                      key: REGISTRATION_ID
                - name: CLUSTER_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: onelens-agent-secrets
                      key: CLUSTER_TOKEN
                
          restartPolicy: {{ .Values.cronjob.restartPolicy }}
{{- end }}
