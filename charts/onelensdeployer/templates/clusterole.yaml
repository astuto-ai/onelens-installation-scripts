{{- if (default dict (default dict .Values.rbac).clusterRole).enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.rbac.clusterRole.name }}
  labels:
    {{- with (default dict .Values.globals).labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
rules:
{{- toYaml .Values.rbac.clusterRole.rules | nindent 2 }}
{{- end }}
