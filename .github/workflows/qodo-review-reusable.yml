name: Qodo Merge — AI Code Review
on:
  workflow_call:
    secrets:
      GCP_WIF_PROVIDER:
        required: true
      GCP_SA_EMAIL:
        required: true

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    if: ${{ github.event.pull_request && !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
          create_credentials_file: true

      - name: Run PR-Agent
        id: pr-agent
        uses: the-pr-agent/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_KEY: ""
          # Vertex AI
          vertexai.vertex_project: "astuto-prod-mum"
          vertexai.vertex_location: "us-central1"
          # Model
          config.model: "vertex_ai/gemini-2.5-pro"
          config.model_turbo: "vertex_ai/gemini-2.5-pro"
          config.fallback_models: '["vertex_ai/gemini-2.5-pro"]'
          config.max_model_tokens: "128000"
          config.ai_timeout: "180"
          config.reasoning_effort: "medium"
          # Review — disabled, using auto_improve (code suggestions) only
          github_action_config.auto_review: "false"
          # Description
          pr_description.publish_labels: "true"
          pr_description.add_original_user_description: "true"
          pr_description.generate_ai_title: "false"
          pr_description.use_bullet_points: "true"
          pr_description.enable_pr_diagram: "true"
          pr_description.enable_semantic_files_types: "true"
          pr_description.collapsible_file_list: "adaptive"
          pr_description.include_generated_by_header: "true"
          # Code suggestions
          pr_code_suggestions.num_code_suggestions_per_chunk: "3"
          pr_code_suggestions.commitable_code_suggestions: "true"
          pr_code_suggestions.focus_only_on_problems: "true"
          pr_code_suggestions.persistent_comment: "true"
          pr_code_suggestions.demand_code_suggestions_self_review: "true"
          pr_code_suggestions.auto_extended_mode: "true"
          pr_code_suggestions.extra_instructions: "Start every suggestion with a priority badge on its own line using this exact format: `🔴 Critical Priority` for security/data loss/crashes (importance 8-10), `🟠 High Priority` for bugs/logic errors (importance 6-7), `🟡 Medium Priority` for missing validation/error handling (importance 4-5), `🟢 Low Priority` for style/naming (importance 1-3). Always include the colored circle emoji and the word Priority."
          # GitHub
          github.publish_inline_comments_fallback_with_verification: "true"
          github.try_fix_invalid_inline_comments: "true"
          # Push trigger (synchronize events)
          github_app.handle_push_trigger: "true"
          github_app.push_commands: '["/describe", "/improve"]'
          # Action config
          github_action_config.auto_describe: "true"
          github_action_config.auto_improve: "true"
          github_action_config.enable_output: "true"
